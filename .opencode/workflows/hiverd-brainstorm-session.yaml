name: hiverd-brainstorm-session
description: "Divergent ideation with convergent evaluation and decision documentation."
version: 1
target_agent: hiverd
steps:
  - name: problem-definition
    description: "Clarify problem statement, constraints, and success criteria with user"
    tool: hiverd
    args:
      action: define
      require_user_confirmation: true
    wave: 1

  - name: divergent-ideation
    description: "Generate 8-15 ideas without filtering, including unconventional options"
    tool: hiverd
    args:
      action: ideate
      min_ideas: 8
      max_ideas: 15
    wave: 2

  - name: convergent-evaluation
    description: "Score ideas against success criteria using weighted evaluation matrix"
    tool: hiverd
    args:
      action: evaluate
      scoring_method: weighted_matrix
    wave: 3

  - name: decision-documentation
    description: "Present top 3 candidates with tradeoffs and recommend one"
    tool: hiverd
    args:
      action: decide
      top_candidates: 3
      template: templates/brainstorm-session-template.md
    wave: 4

guards:
  - rule: problem_defined
    check: problem_statement_confirmed
  - rule: sufficient_ideas
    check: minimum_eight_ideas_generated
  - rule: criteria_present
    check: evaluation_criteria_defined
