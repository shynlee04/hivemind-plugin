# GX-Pack Workflow: Semantic Validation Pipeline
#
# Chain: /gx-validate → gx-semantic-pipeline.yaml → gx-context-engine skill
# Purpose: Validate command→workflow→skill→script chain integrity
# Trigger: /gx-validate command or stage close gate

name: gx-semantic-pipeline
description: "Load → Check → Report → Remediate semantic chain validation pipeline"
trigger: "/gx-validate"
skill: gx-context-engine
agent: hiveminder

# ── Entry Criteria ──
entry:
  - Runtime profile exists with audit_health intent
  - At least one GX-Pack command exists on disk

# ── Steps ──
steps:
  1_load:
    name: "Enumerate GX-Pack assets"
    action: |
      Scan .opencode/ for:
      - All gx-* commands (commands/gx-*.md)
      - All gx-* workflows (workflows/gx-*.yaml)
      - gx-context-engine skill (skills/gx-context-engine/)
      - All scripts in skill (scripts/gx-*.sh)
      Build asset inventory with file paths and line counts.
    output: "asset inventory JSON"
    error:
      - "Scan fails → report what exists, mark missing as findings"

  2_check:
    name: "Validate chains"
    action: |
      For each command:
        1. Parse frontmatter (name, description, agent)
        2. Find workflow reference in <process> block
        3. Verify workflow file exists
        4. In workflow: find skill reference
        5. Verify skill SKILL.md exists
        6. In skill: find script references
        7. Verify scripts exist and are executable
        8. Verify scripts produce JSON output (dry run)
      
      For intent alignment:
        1. Read runtime-profile.json
        2. Compare declared intent with actual operations
        3. Check scope coverage
    script: "bash scripts/gx-semantic-validate.sh . build"
    output: "validation report with mismatches[] and chain_integrity"
    error:
      - "Script returns stub → report 'semantic validation not yet implemented (Phase 2)'"

  3_report:
    name: "Rank and present findings"
    action: |
      Group findings by severity: critical → high → medium → low.
      For each finding: rule ID, severity, detail, suggested fix.
      Calculate chain integrity percentage.
      Present summary to user.
    output: "findings report with severity breakdown"

  4_remediate:
    name: "Fix broken links (Phase 2+)"
    action: |
      If user requests remediation AND Phase 2 is complete:
      - Re-wire broken command→workflow links
      - Fix missing script references in SKILL.md
      - Restore missing execute permissions
      Otherwise: report findings only, skip remediation.
    constraints:
      - "Only fix structural issues (missing references, broken links)"
      - "Never modify semantic content (business logic, descriptions)"
      - "Requires Phase 2 completion for full remediation"
    error:
      - "Remediation not yet available → report findings only"

# ── Exit Criteria ──
exit:
  - All chains validated (or findings reported)
  - Chain integrity percentage calculated
  - Findings severity-ranked

# ── Offer Next ──
offer_next:
  - "/gx-steer — Route to appropriate workflow based on findings"
  - "/gx-recover — If critical findings need immediate fix"
  - "/gx-profile — If profile issues detected"

# ── Error Routing ──
error_routing:
  scan_empty: "No GX-Pack assets found — suggest running /gx-steer first"
  validation_stub: "Phase 2 not complete — report structural checks only"
  remediation_blocked: "Phase 2 required for remediation — findings only"
