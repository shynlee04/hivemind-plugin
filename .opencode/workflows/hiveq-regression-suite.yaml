contract_version: 2
name: hiveq-regression-suite
description: "Detect regressions by comparing current state against saved baselines."
version: 1
target_agent: hiveq
steps:
  - name: baseline-loading
    description: "Retrieve previous verification results from memory or git history"
    tool: hiveq
    wave: 1
    skill_bundles:
      - regression-detection
    args:
      action: load_baseline
      sources:
        - hivemind_memory
        - git_log
    entry_criteria: "Regression check triggered"
    exit_criteria: "Baseline loaded from memory or git history"

  - name: test-execution
    description: "Run current test suite, type checks, and LOC counts"
    tool: hiveq
    wave: 2
    skill_bundles:
      - verification-methodology
      - gate-enforcement
    args:
      action: execute_checks
      commands:
        - "npm test"
        - "npx tsc --noEmit"
    entry_criteria: "Baseline loaded"
    exit_criteria: "Current checks executed"

  - name: diff-analysis
    description: "Compare current vs baseline: new failures, new errors, LOC increases"
    tool: hiveq
    wave: 3
    skill_bundles:
      - regression-detection
      - evidence-discipline
    args:
      action: diff
    entry_criteria: "Current checks complete"
    exit_criteria: "Diff analysis produced"

  - name: regression-reporting
    description: "List regressions with before/after evidence and impact classification"
    tool: hiveq
    wave: 4
    skill_bundles:
      - evidence-discipline
    args:
      action: report
      template: templates/verification-report-template.md
    entry_criteria: "Diff analysis complete"
    exit_criteria: "Regression report generated with impact classification"

guards:
  - rule: baseline_exists
    check: at_least_one_baseline_loaded
  - rule: checks_completed
    check: all_gate_commands_executed
