name: hiveq-regression-suite
description: "Detect regressions by comparing current state against saved baselines."
version: 1
target_agent: hiveq
steps:
  - name: baseline-loading
    description: "Retrieve previous verification results from memory or git history"
    tool: hiveq
    args:
      action: load_baseline
      sources:
        - hivemind_memory
        - git_log
    wave: 1

  - name: test-execution
    description: "Run current test suite, type checks, and LOC counts"
    tool: hiveq
    args:
      action: execute_checks
      commands:
        - "npm test"
        - "npx tsc --noEmit"
    wave: 2

  - name: diff-analysis
    description: "Compare current vs baseline: new failures, new errors, LOC increases"
    tool: hiveq
    args:
      action: diff
    wave: 3

  - name: regression-reporting
    description: "List regressions with before/after evidence and impact classification"
    tool: hiveq
    args:
      action: report
      template: templates/verification-report-template.md
    wave: 4

guards:
  - rule: baseline_exists
    check: at_least_one_baseline_loaded
  - rule: checks_completed
    check: all_gate_commands_executed
