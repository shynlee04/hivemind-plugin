contract_version: 2
name: hivefiver-enterprise
target_agent: hivefiver
description: Strict enterprise flow for high-complexity requirement streams with evidence and export controls.
version: 2
steps:
  - name: bootstrap
    tool: hivefiver
    wave: 1
    skill_bundles:
      - meta-builder-governance
      - hivefiver-persona-routing
    args:
      action: init
      lane: enterprise_architect
    entry_criteria: "Lane selected"
    exit_criteria: "Hivefiver initialized in enterprise lane"
  - name: doctor-preflight
    tool: hivefiver-audit
    wave: 2
    skill_bundles:
      - meta-builder-governance
    args:
      focus: governance_mcp_and_drift
    entry_criteria: "Bootstrap complete"
    exit_criteria: "Governance, MCP, and drift status audited"
  - name: intake
    tool: hivefiver-intake
    wave: 3
    skill_bundles:
      - meta-builder-governance
      - hivefiver-persona-routing
    args:
      style: controlled_mcq
      strictness: strict
    entry_criteria: "Preflight passed"
    exit_criteria: "Requirements normalized via strict MCQ"
  - name: spec
    tool: hivefiver-specforge
    wave: 4
    skill_bundles:
      - hivefiver-spec-distillation
    args:
      require_ambiguity_map: true
      block_high_ambiguity: true
      retry_limit: 10
    entry_criteria: "Intake complete"
    exit_criteria: "Spec with ambiguity map generated"
  - name: research
    tool: hivefiver-research
    wave: 5
    skill_bundles:
      - research-methodology
      - source-evaluation
    args:
      fallback: graceful_with_caveats
      enforce_provider_status: true
      require_contradiction_register: true
      retry_limit: 10
    entry_criteria: "Spec accepted"
    exit_criteria: "Research completed with provider status and contradictions"
  - name: architect
    tool: hivefiver-architect
    wave: 6
    skill_bundles:
      - meta-builder-governance
      - hivefiver-persona-routing
    args:
      enforce_domain_pack: true
    entry_criteria: "Research evidence available"
    exit_criteria: "Architecture designed with domain pack enforced"
  - name: gsd-bridge
    tool: hivefiver-gsd-bridge
    wave: 7
    skill_bundles:
      - meta-builder-governance
      - hivefiver-gsd-compat
    args:
      compatibility_wrapper: true
      require_lineage_report: true
    entry_criteria: "Architecture finalized"
    exit_criteria: "GSD-compatible output with lineage report"
  - name: validate-export
    tool: hivefiver-validate
    wave: 8
    skill_bundles:
      - meta-builder-governance
      - gate-enforcement
    args:
      require_schema_gate: true
      include_todo_story_map: true
    entry_criteria: "GSD bridge complete"
    exit_criteria: "Schema gate passed, todo story map included"
guards:
  - rule: no_execution_without_plan
    check: connected_task_graph
  - rule: strict_evidence
    check: contradictory_claims_resolved
  - rule: mcp_readiness
    check: provider_status_reported
  - rule: schema_gate
    check: prd_json_valid
  - rule: export_cycle
    check: cycle_exported
