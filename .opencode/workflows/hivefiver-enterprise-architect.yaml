contract_version: 2
name: hivefiver-enterprise-architect
target_agent: hivefiver
description: Corporate-scale architect workflow with compliance-first checkpoints, deterministic orchestration, and export assurance.
version: 1
steps:
  - name: bootstrap
    tool: hivefiver
    wave: 1
    skill_bundles:
      - meta-builder-governance
      - hivefiver-persona-routing
    args:
      action: init
      lane: enterprise_architect
    entry_criteria: "Lane selected and context prepared"
    exit_criteria: "Hivefiver initialized in enterprise_architect lane"
  - name: compliance-intake
    tool: hivefiver-intake
    wave: 2
    skill_bundles:
      - meta-builder-governance
      - hivefiver-persona-routing
    args:
      style: controlled_mcq
      strictness: strict
    entry_criteria: "Hivefiver bootstrapped"
    exit_criteria: "Requirements captured via controlled MCQ with strict validation"
  - name: spec-gate
    tool: hivefiver-specforge
    wave: 3
    skill_bundles:
      - hivefiver-spec-distillation
    args:
      block_high_ambiguity: true
      retry_limit: 10
    entry_criteria: "Intake complete"
    exit_criteria: "Spec candidate generated with ambiguity blocked"
  - name: research-evidence
    tool: hivefiver-research
    wave: 4
    skill_bundles:
      - research-methodology
      - source-evaluation
    args:
      require_contradiction_register: true
      retry_limit: 10
    entry_criteria: "Spec accepted"
    exit_criteria: "Evidence gathered with contradiction register"
  - name: architecture
    tool: hivefiver-architect
    wave: 5
    skill_bundles:
      - meta-builder-governance
      - hivefiver-persona-routing
    args:
      enforce_subagent_policy: true
    entry_criteria: "Research evidence available"
    exit_criteria: "Architecture designed with subagent policy enforced"
  - name: orchestration
    tool: hivefiver-workflow
    wave: 6
    skill_bundles:
      - meta-builder-governance
    args:
      export_cycle_required: true
    entry_criteria: "Architecture finalized"
    exit_criteria: "Workflow orchestration produced with export cycle"
  - name: gsd-wrap
    tool: hivefiver-gsd-bridge
    wave: 7
    skill_bundles:
      - meta-builder-governance
      - hivefiver-gsd-compat
    args:
      compatibility_wrapper: true
    entry_criteria: "Orchestration complete"
    exit_criteria: "GSD-compatible output generated"
  - name: ralph-export
    tool: hivefiver-ralph-bridge
    wave: 8
    skill_bundles:
      - meta-builder-governance
    args:
      validate_schema: true
    entry_criteria: "GSD wrap complete"
    exit_criteria: "Schema-validated export emitted"
guards:
  - rule: compliance_gate
    check: regulatory_matrix_passed
  - rule: evidence_gate
    check: confidence_not_fake
  - rule: lineage_gate
    check: connected_task_graph
  - rule: schema_gate
    check: prd_json_valid
  - rule: export_cycle
    check: cycle_exported
