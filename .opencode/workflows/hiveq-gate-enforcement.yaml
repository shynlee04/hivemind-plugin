name: hiveq-gate-enforcement
description: "Execute quality gates: identify gate, run command, parse result, emit verdict."
version: 1
target_agent: hiveq
steps:
  - name: gate-identification
    description: "Resolve which gate(s) to run from arguments"
    tool: hiveq
    args:
      action: identify_gates
    wave: 1

  - name: command-execution
    description: "Execute gate command(s) and capture output"
    tool: hiveq
    args:
      action: execute
      capture_output: true
    wave: 2

  - name: result-parsing
    description: "Parse command output for pass/fail determination"
    tool: hiveq
    args:
      action: parse
    wave: 3

  - name: verdict-emission
    description: "Produce structured gate result with raw output"
    tool: hiveq
    args:
      action: emit_verdict
      template: templates/gate-checklist-template.md
    wave: 4

guards:
  - rule: gate_valid
    check: gate_id_recognized
  - rule: command_completed
    check: gate_command_exit_captured
