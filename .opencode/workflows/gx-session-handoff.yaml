# GX-Pack Workflow: Session Handoff
#
# Chain: Session end → gx-session-handoff.yaml → gx-context-engine skill
# Purpose: Export → Purify → Schema validate → SOT register
# Trigger: Session compaction, manual export, or auto-purge

name: gx-session-handoff
description: "Export → Purify → Schema → SOT register session handoff pipeline"
trigger: "session.compacted OR manual export OR auto-purge"
skill: gx-context-engine
agent: hiveminder

# ── Entry Criteria ──
entry:
  - Session has produced at least 1 tool call
  - Enforcement state exists (.hivemind/state/enforcement.json)

# ── Steps ──
steps:
  1_export:
    name: "Create handoff payload"
    action: |
      Use hiveops_export tool to create handoff:
      - Summary of session accomplishments
      - Decisions made during session
      - Blockers encountered
      - Next actions recommended
      - Artifacts created/modified
      - Risk assessment
    tool: "hiveops_export (action: handoff)"
    output: "handoff payload at .hivemind/handoffs/"
    error:
      - "Export tool fails → manual handoff summary"

  2_purify:
    name: "Strip noise and extract decisions"
    action: |
      Run gx-handoff-purify.sh to clean the handoff:
      - Remove tool call metadata
      - Remove repeated system messages
      - Extract decisions (pattern: "decided to...", "chose...", "rejected...")
      - Extract evidence (command outputs, diffs, test results)
      - Extract pending actions (pattern: "next:", "TODO:", "remaining:")
      - Validate against handoff schema
    script: "bash scripts/gx-handoff-purify.sh ."
    output: "purified handoff JSON + markdown"
    error:
      - "Purification fails (Phase 2 stub) → use raw handoff"

  3_schema:
    name: "Validate schema versions"
    action: |
      Run gx-schema-sync.sh on all modified state files:
      - Validate JSON structure
      - Check for version conflicts
      - Update schema-registry.json
    script: "bash scripts/gx-schema-sync.sh ."
    output: "schema registry updated"
    error:
      - "Schema sync fails (Phase 2 stub) → skip, non-blocking"

  4_register:
    name: "Register in SOT index"
    action: |
      Run gx-sot-register.sh to:
      - Append to .hivemind/exports/<date>-handoff.jsonl
      - Update sot-index.json with new entry
      - Tag for grep/glob retrieval
    script: "bash scripts/gx-sot-register.sh ."
    output: "SOT-indexed JSONL entry"
    error:
      - "SOT registration fails (Phase 3 stub) → skip, non-blocking"

  5_archive:
    name: "Archive enforcement state"
    action: |
      Move session artifacts to .hivemind/archive/<date>/:
      - enforcement.json snapshot
      - delegation-audit.jsonl (if exists)
      - pre-purge snapshots (if any)
    output: "archived session state"

# ── Exit Criteria ──
exit:
  - Handoff payload created (step 1 minimum)
  - Purified if Phase 2+ available
  - Schema validated if Phase 2+ available
  - SOT registered if Phase 3+ available

# ── Offer Next ──
offer_next:
  - "Session complete — handoff available for next session"
  - "Run /gx-steer in next session to resume with recovered context"

# ── Error Routing ──
error_routing:
  export_fails: "Manual summary creation — always produce something"
  purify_stub: "Use raw handoff — acceptable for Phase 1"
  schema_stub: "Skip schema sync — non-blocking for Phase 1"
  register_stub: "Skip SOT registration — non-blocking for Phase 1"
