contract_version: 2
name: sequential-delegation-workflow
target_agent: hiveminder
description: |
  Robust orchestration workflow with sequential delegation, result awaiting,
  domain boundaries, and hierarchy gatekeeping. The safer choice for app development.

# Domain Boundaries
domains:
  backend:
    description: "Server-side logic, tools, hooks, schemas"
    paths:
      allowed:
        - "src/lib/"
        - "src/tools/"
        - "src/schemas/"
        - "src/hooks/"
        - "src/cli/"
        - "tests/"
      forbidden:
        - "src/dashboard/"
        - "src/views/"
        - "src/components/"
    agents: ["hivemaker", "hivehealer", "hivexplorer"]

  frontend:
    description: "Dashboard, TUI, views, components"
    paths:
      allowed:
        - "src/dashboard/"
        - "src/views/"
        - "src/components/"
        - "src/types/"
      forbidden:
        - "src/lib/"
        - "src/tools/"
        - "src/schemas/"
    agents: ["hivemaker"]

  shared:
    description: "Types, utilities, tests"
    paths:
      allowed:
        - "src/types/"
        - "src/utils/"
        - "tests/"
      forbidden: []
    agents: ["hivemaker", "hivehealer"]

# Hierarchy Requirements
hierarchy:
  required_chain:
    - level: trajectory
      must_exist: true
      source: "declare_intent"
    - level: tactic
      must_exist: true
      source: "map_context"
      parent: trajectory
    - level: action
      must_exist: true
      source: "map_context"
      parent: tactic

  max_staleness: "2h"
  staleness_action: "think_back"

# Workflow Steps
steps:
  - name: "Gate Check"
    description: "Verify hierarchy and context before any action"
    tool: "scan_hierarchy"
    wave: 1
    skill_bundles:
      - context-integrity
    args:
      action: "status"
    entry_criteria: "Session active"
    exit_criteria: "Hierarchy verified: trajectory and session_status confirmed"
    required_output:
      - "trajectory"
      - "session_status"
    on_failure:
      action: "declare_intent"
      message: "NO ACTION WITHOUT TRAJECTORY"

  - name: "Context Purity Check"
    description: "Ensure context is not corrupted"
    tool: "think_back"
    wave: 2
    skill_bundles:
      - context-integrity
    args:
      mode: "check"
    entry_criteria: "Gate check passed"
    exit_criteria: "Drift score below threshold"
    required_output:
      - "drift_score"
    validation:
      drift_score: "< 60"
    on_failure:
      action: "think_back"
      args:
        mode: "full"

  - name: "Plan Retrieval"
    description: "Never act without verified planning"
    tool: "recall_mems"
    wave: 3
    skill_bundles:
      - context-integrity
    args:
      query: "plan"
    entry_criteria: "Context purity verified"
    exit_criteria: "Planning artifacts retrieved"
    required_output: []
    on_empty:
      action: "stop"
      message: "NO ACT WITHOUT SUCCESS RETRIEVAL OF PLANNING"

  - name: "Domain Boundary Verification"
    description: "Check target files against domain boundaries"
    tool: "grep"
    wave: 4
    skill_bundles: []
    args:
      pattern: "${target_files}"
    entry_criteria: "Plan retrieved"
    exit_criteria: "Domain boundaries validated for target files"
    validation:
      custom: "checkDomainBoundary"
    on_failure:
      action: "reroute"
      message: "DOMAIN BOUNDARY VIOLATION"

  - name: "Delegate Task"
    description: "Sequential delegation with explicit return format"
    tool: "task"
    wave: 5
    skill_bundles:
      - delegation-intelligence
    args:
      description: "${task_description}"
      prompt: "${task_prompt_with_return_format}"
      subagent_type: "${assigned_agent}"
    entry_criteria: "Domain boundaries valid"
    exit_criteria: "Sub-agent task dispatched and awaiting result"
    await_result: true
    timeout: "5m"

  - name: "Process Result"
    description: "Handle result, retune or reroute as needed"
    tool: "export_cycle"
    wave: 6
    skill_bundles:
      - delegation-intelligence
    args:
      outcome: "${delegation_outcome}"
      findings: "${delegation_findings}"
    entry_criteria: "Delegation result received"
    exit_criteria: "Outcome classified and routed"
    on_outcome:
      success:
        action: "proceed"
        next: "Update Hierarchy"
      partial:
        action: "retune"
        next: "Save Partial Progress"
      failure:
        action: "stop"
        next: "Escalate Failure"

  - name: "Update Hierarchy"
    description: "Mark action complete, update cursor"
    tool: "map_context"
    wave: 7
    skill_bundles:
      - context-integrity
    args:
      level: "action"
      content: "${findings}"
    entry_criteria: "Successful outcome processed"
    exit_criteria: "Hierarchy updated with action completion"
    then: "next_task"

  - name: "Save Partial Progress"
    description: "Store partial success for follow-up"
    tool: "save_mem"
    wave: 7
    skill_bundles: []
    args:
      shelf: "partial_progress"
      content: "${partial_findings}"
      tags: "needs-followup"
    entry_criteria: "Partial outcome processed"
    exit_criteria: "Partial findings stored for follow-up"

  - name: "Escalate Failure"
    description: "Save failure state for recovery"
    tool: "save_anchor"
    wave: 7
    skill_bundles: []
    args:
      key: "failure_${timestamp}"
      value: "${failure_details}"
    entry_criteria: "Failure outcome processed"
    exit_criteria: "Failure state anchored"
    then: "ask_user"

# Guards (v2 contract)
guards:
  - rule: trajectory_present
    check: hierarchy_trajectory_not_null
  - rule: context_pure
    check: drift_score_below_threshold
  - rule: plan_retrieved
    check: planning_artifacts_available
  - rule: domain_boundary
    check: domain_boundary_valid
  - rule: chain_intact
    check: ancestors_chain_complete

# Gatekeeping Rules
gatekeeping:
  - rule: "NO_ACTION_WITHOUT_TRAJECTORY"
    check: "hierarchy.trajectory != null"
    fix: "declare_intent"

  - rule: "NO_ACTION_WITHOUT_TACTIC"
    check: "hierarchy.tactic != null"
    fix: "map_context({ level: 'tactic' })"

  - rule: "NO_ACTION_WITH_PURE_CONTEXT"
    check: "drift_score < 60"
    fix: "think_back({ mode: 'full' })"

  - rule: "NO_ACTION_WITHOUT_PLAN"
    check: "recall_mems({ query: 'plan' }).length > 0"
    fix: "create_plan_first"

  - rule: "NO_CROSS_DOMAIN_WITHOUT_APPROVAL"
    check: "domain_boundary_valid"
    fix: "ask_user"

  - rule: "NO_BROKEN_CHAIN"
    check: "ancestors.length == 3"
    fix: "map_context to repair"

# Result Handling
result_handling:
  success:
    actions:
      - "export_cycle"
      - "map_context update"
      - "proceed to next"
  
  partial:
    actions:
      - "save_mem partial"
      - "retune plan"
      - "reroute if needed"
  
  failure:
    actions:
      - "save_anchor failure"
      - "stop chain"
      - "escalate to user"
      - "do not proceed"

# Timeout Configuration
timeouts:
  gate_check: "30s"
  context_recovery: "2m"
  delegation: "5m"
  result_processing: "1m"
