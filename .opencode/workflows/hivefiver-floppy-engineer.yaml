contract_version: 2
name: hivefiver-floppy-engineer
target_agent: hivefiver
description: Distillation-heavy workflow for messy requirement dumps with coherence cleanup and phased validation loops.
version: 1
steps:
  - name: bootstrap
    tool: hivefiver
    wave: 1
    skill_bundles:
      - meta-builder-governance
      - hivefiver-persona-routing
    args:
      action: init
      lane: floppy_engineer
    entry_criteria: "Lane selected"
    exit_criteria: "Hivefiver initialized in floppy_engineer lane"
  - name: intake-cleanup
    tool: hivefiver-intake
    wave: 2
    skill_bundles:
      - meta-builder-governance
      - hivefiver-persona-routing
    args:
      style: mixed_mcq_and_chunk_cleanup
      strictness: strict
    entry_criteria: "Bootstrap complete"
    exit_criteria: "Messy requirements cleaned and normalized"
  - name: spec-distill
    tool: hivefiver-specforge
    wave: 3
    skill_bundles:
      - hivefiver-spec-distillation
    args:
      require_ambiguity_map: true
      retry_limit: 10
    entry_criteria: "Intake cleanup complete"
    exit_criteria: "Coherent spec distilled from cleaned input"
  - name: research
    tool: hivefiver-research
    wave: 4
    skill_bundles:
      - research-methodology
      - source-evaluation
    args:
      enforce_provider_status: true
      retry_limit: 10
    entry_criteria: "Spec accepted"
    exit_criteria: "Research evidence gathered with provider status"
  - name: workflow
    tool: hivefiver-workflow
    wave: 5
    skill_bundles:
      - meta-builder-governance
    args:
      orchestrator_mode: deterministic
    entry_criteria: "Research complete"
    exit_criteria: "Workflow orchestration produced in deterministic mode"
  - name: validate
    tool: hivefiver-validate
    wave: 6
    skill_bundles:
      - meta-builder-governance
      - gate-enforcement
    args:
      require_schema_gate: true
    entry_criteria: "Workflow generated"
    exit_criteria: "Schema gate passed"
guards:
  - rule: context_first
    check: hierarchy_chain_complete
  - rule: cleanup_gate
    check: coherence_score_passed
  - rule: evidence_gate
    check: confidence_not_fake
  - rule: graph_connected
    check: connected_task_graph
