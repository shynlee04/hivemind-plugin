# GX-Pack Workflow: Recover Loop
#
# Chain: /gx-recover → gx-recover-loop.yaml → gx-context-engine skill
# Purpose: Diagnose, fix, and verify context recovery
# Trigger: /gx-recover command or auto-purge detection

name: gx-recover-loop
description: "Scan → Diagnose → Fix → Verify → Export recovery loop for context degradation"
trigger: "/gx-recover"
skill: gx-context-engine
agent: hiveminder

# ── Entry Criteria ──
entry:
  - Runtime profile exists (gx-entry-guard.sh ran)
  - Context degradation detected (dirty_score > 0 or user-requested)

# ── Steps ──
steps:
  1_scan:
    name: "Scan for degradation sources"
    action: |
      Investigate .opencode/ and .hivemind/ for:
      - Broken command→workflow→skill links
      - Orphan TODO items without hierarchy linkage
      - Stale enforcement state
      - Expired runtime profiles
      - Scope violation accumulation
    delegate_to: hivexplorer (if deep investigation needed)
    output: "scan_report.json with findings[]"
    error:
      - "Scan fails → report what was accessible, skip inaccessible"

  2_diagnose:
    name: "Diagnose root causes"
    action: |
      Run gx-mid-guard.sh to get full health report.
      Cross-reference scan findings with mid-guard output.
      Identify: drift sources, blocked TODOs, expired profiles, scope violations.
      Rank issues by severity: critical → high → medium → low.
    script: "bash scripts/gx-mid-guard.sh ."
    output: "diagnosis with severity-ranked issues"
    error:
      - "Mid-guard fails → manual diagnosis from scan report"

  3_fix:
    name: "Apply targeted repairs"
    action: |
      For each issue by severity (critical first):
      - Expired profile → rebuild with gx-entry-guard.sh
      - Orphan TODOs → cancel or link via hiveops_todo
      - Stale hierarchy → update via hierarchy_manage
      - Broken chains → re-wire command→workflow→skill links
      - Dirty context → snapshot + spawn retrieval agent
    delegate_to: hivehealer (L3, for chain repairs)
    constraints:
      - "L3 agent receives scoped delegation packet with profile_id"
      - "L3 agent cannot modify commands or workflows directly"
      - "All fixes must be verified individually"
    error:
      - "Fix fails → rollback to pre-fix state, report failure"
      - "L3 exceeds scope → block, report to orchestrator"

  4_verify:
    name: "Verify recovery"
    action: |
      Re-run gx-mid-guard.sh to confirm recovery.
      All scores must be below warning threshold (70).
      If still degraded → loop back to step 3 (max 3 iterations).
    script: "bash scripts/gx-mid-guard.sh ."
    delegate_to: hiveq (Monitor — verification only)
    max_iterations: 3
    output: "verification report with before/after comparison"
    error:
      - "3 iterations exhausted → report partial recovery, list residual issues"

  5_export:
    name: "Export recovery results"
    action: |
      If session is ending:
      - Run gx-handoff-purify.sh to clean handoff
      - Run gx-sot-register.sh to index in SOT
      Always: update STATE.md with recovery outcome.
    script: |
      bash scripts/gx-handoff-purify.sh .
      bash scripts/gx-sot-register.sh .
    output: "purified handoff + SOT registration"

# ── Exit Criteria ──
exit:
  - Drift score below 70 (verified by gx-mid-guard.sh)
  - All critical issues resolved
  - Recovery evidence collected (before/after scores)

# ── Offer Next ──
offer_next:
  - "/gx-steer — Resume governed operations"
  - "/gx-validate — Run semantic validation to confirm chain integrity"
  - "/gx-profile — Inspect rebuilt profile"

# ── Error Routing ──
error_routing:
  scan_fails: "Report accessible findings, skip inaccessible"
  fix_fails: "Rollback to pre-fix state, report to user"
  verify_fails: "Loop (max 3x), then report partial recovery"
  export_fails: "Log error, do not block recovery"
