# Sync source changes from feature/harness-implementation to oss-dev
# Explicit whitelist model — only listed paths and file patterns are synced.
# GSD/internal artifacts (gsd-* agents, get-shit-done/, .planning/, .hivemind/,
# .hivefiver-meta-builder/) are explicitly excluded from public OSS branch.
name: Sync to OSS Branch

on:
  workflow_dispatch:
    inputs:
      commit_range:
        description: 'Commit range to sync (e.g., HEAD~3..HEAD or specific SHA)'
        required: false
        default: 'HEAD~1..HEAD'
      dry_run:
        description: 'Dry run — show what would be synced without pushing'
        type: boolean
        default: true

permissions:
  contents: write

env:
  # WHITELIST: Only these paths are synced to the OSS branch
  PUBLIC_PATHS: >-
    src/
    docs/philosophy/
    docs/guides/
    docs/architecture/
    package.json
    tsconfig.json
    vitest.config.ts
    README.md
    CONTRIBUTING.md
    CHANGELOG.md
    LICENSE
    .npmignore
    .gitignore
    .github/workflows/

  # EXCLUDE: Patterns to filter out from .opencode/ and root
  EXCLUDE_PATTERNS: >-
    .opencode/agents/gsd-
    .opencode/skills/gsd-
    .opencode/commands/gsd-
    .opencode/workflows/gsd-
    .opencode/get-shit-done/
    .opencode/references/
    .opencode/templates/
    .hivefiver-meta-builder/
    .hivemind/
    .planning/
    .scratch/
    node_modules/
    dist/

jobs:
  sync:
    name: Sync to oss-dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve whitelist paths
        id: resolve
        run: |
          echo "🔍 Resolving whitelist paths from PUBLIC_PATHS..."

          PATHS=""
          for path in ${{ env.PUBLIC_PATHS }}; do
            if [ -e "$path" ]; then
              PATHS="$PATHS $path"
              echo "  ✅ $path"
            else
              echo "  ⚠️  $path (not found)"
            fi
          done

          # .opencode/ — whitelist shipped primitives only (hm-*/hf-*/gate-*/stack-*)
          if [ -d ".opencode" ]; then
            for subdir in agents commands skills workflows; do
              shipped_count=0
              for pattern in "hm-" "hf-" "gate-" "stack-"; do
                files=$(find ".opencode/$subdir" -name "${pattern}*" -type f 2>/dev/null)
                if [ -n "$files" ]; then
                  shipped_count=$((shipped_count + 1))
                  PATHS="$PATHS $(echo "$files" | tr '\n' ' ')"
                fi
              done
              echo "  ✅ .opencode/$subdir/ ($shipped_count shipped primitives)"
            done
            # .opencode/references/ and .opencode/templates/ excluded (internal paths)
            echo "  ⏭️ .opencode/references/ (excluded — internal paths)"
            echo "  ⏭️ .opencode/templates/ (excluded — internal paths)"
          fi

          echo "SYNC_PATHS=$PATHS" >> $GITHUB_ENV
          echo "📦 Whitelisted paths: $PATHS"

      - name: Pre-sync validation — check for leaks
        run: |
          echo "🔍 Validating no GSD/internal artifacts in whitelist..."

          LEAKED_GSD=$(find .opencode -name "gsd-*" -type f 2>/dev/null | wc -l)
          if [ "$LEAKED_GSD" -gt 0 ]; then
            echo "::warning::LEAK DETECTED: $LEAKED_GSD gsd-* files in .opencode/"
            echo "Would-be leaked files:"
            find .opencode -name "gsd-*" -type f 2>/dev/null
          else
            echo "  ✅ No GSD files in .opencode/ content"
          fi

          for banned_dir in .planning .hivemind .hivefiver-meta-builder .scratch; do
            if [ -d "$banned_dir" ]; then
              count=$(find "$banned_dir" -type f 2>/dev/null | wc -l)
              echo "  ✅ $banned_dir/ ($count files — excluded from sync)"
            fi
          done

          echo "  ✅ Pre-sync validation complete"

      - name: Generate sync patch
        run: |
          echo "📦 Generating diff for paths: $SYNC_PATHS"

          # Generate patch for changes
          git diff ${{ github.event.inputs.commit_range }} -- $SYNC_PATHS > /tmp/sync.patch || true

          # Capture new files by diffing against oss-dev
          git diff origin/oss-dev..HEAD -- $SYNC_PATHS > /tmp/full-sync.patch || true

          if [ -s /tmp/sync.patch ]; then
            echo "✅ Incremental patch: $(wc -l < /tmp/sync.patch) lines"
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          elif [ -s /tmp/full-sync.patch ]; then
            echo "✅ Full diff patch available (new files detected)"
            cp /tmp/full-sync.patch /tmp/sync.patch
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          else
            echo "ℹ️ No source changes to sync"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          fi

      - name: Preview changes (dry run)
        if: env.HAS_CHANGES == 'true'
        run: |
          echo "📋 Files that would be synced:"
          git diff --stat ${{ github.event.inputs.commit_range }} -- $SYNC_PATHS
          echo ""
          echo "📋 New files (vs oss-dev):"
          git diff --stat --diff-filter=A origin/oss-dev..HEAD -- $SYNC_PATHS

      - name: Apply to oss-dev (checkout strategy)
        if: env.HAS_CHANGES == 'true' && github.event.inputs.dry_run == 'false'
        run: |
          SOURCE_SHA=$(git rev-parse HEAD)

          echo "🔄 Dereferencing symlinks for shipped primitives..."
          mkdir -p /tmp/resolved-opencode
          for dir in agents commands skills workflows; do
            if [ -e ".opencode/$dir" ]; then
              cp -RL ".opencode/$dir" "/tmp/resolved-opencode/"
            fi
          done

          git checkout oss-dev

          echo "🧹 Cleaning previous state for synced directories..."
          for path in $SYNC_PATHS; do
            if [ -d "$path" ] || [[ "$path" == */ ]]; then
              dir_path=${path%/}
              if [ -d "$dir_path" ] 2>/dev/null; then
                echo "  🗑️  Cleaning $dir_path"
                git rm -r --cached "$dir_path" 2>/dev/null || true
                rm -rf "$dir_path"
              fi
            fi
          done

          # Explicitly remove any banned directories that may exist on oss-dev
          for dirtoban in .planning .hivemind .hivefiver-meta-builder; do
            if [ -d "$dirtoban" ]; then
              echo "  🗑️  Removing banned directory: $dirtoban/"
              git rm -rf --cached "$dirtoban" 2>/dev/null || true
              rm -rf "$dirtoban"
            fi
          done

          echo "🔄 Syncing directories and files from $SOURCE_SHA..."
          for path in $SYNC_PATHS; do
            echo "  → $path"
            git checkout $SOURCE_SHA -- "$path" 2>/dev/null || echo "  ⚠️  $path skipped"
          done

          echo "🔄 Restoring dereferenced shipped primitives..."
          for dir in agents commands skills workflows; do
            if [ -d "/tmp/resolved-opencode/$dir" ]; then
              rm -rf ".opencode/$dir"
              cp -R "/tmp/resolved-opencode/$dir" ".opencode/"
            fi
          done

          git add -A

          if git diff --cached --quiet; then
            echo "ℹ️ No effective changes after sync"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            echo "✅ Staged: $(git diff --cached --stat | tail -1)"
          fi

      - name: Commit changes
        if: env.HAS_CHANGES == 'true' && github.event.inputs.dry_run == 'false'
        run: |
          CHANGED_DIRS=$(git diff --cached --name-only | sed 's|/.*||' | sort -u | tr '\n' ', ' | sed 's/,$//')
          NEW_FILES=$(git diff --cached --diff-filter=A --name-only | wc -l | tr -d ' ')
          MOD_FILES=$(git diff --cached --diff-filter=M --name-only | wc -l | tr -d ' ')
          DEL_FILES=$(git diff --cached --diff-filter=D --name-only | wc -l | tr -d ' ')

          MSG="sync: merge source changes from feature branch

          Synced: $CHANGED_DIRS
          Source range: ${{ github.event.inputs.commit_range }}
          Files: +${NEW_FILES} new, ~${MOD_FILES} modified, -${DEL_FILES} deleted"

          git commit -m "$MSG"

      - name: Verify oss-dev build
        if: env.HAS_CHANGES == 'true' && github.event.inputs.dry_run == 'false'
        run: |
          npm install
          npm run typecheck
          npm run build
          npm test

      - name: Push oss-dev
        if: env.HAS_CHANGES == 'true' && github.event.inputs.dry_run == 'false'
        run: |
          git remote add public https://${{ secrets.PUBLIC_REPO_PAT }}@github.com/shynlee04/hivemind-plugin.git
          git push public oss-dev:oss-dev
