# Sync source changes from feature/harness-implementation to oss-dev
# Auto-detects all non-dot directories at root and syncs them
# Excludes dot directories and restricts docs/ to specific subdirs
# Consumes .planning/ docs to update README + CHANGELOG
name: Sync to OSS Branch

on:
  workflow_dispatch:
    inputs:
      commit_range:
        description: 'Commit range to sync (e.g., HEAD~3..HEAD or specific SHA)'
        required: false
        default: 'HEAD~1..HEAD'
      dry_run:
        description: 'Dry run — show what would be synced without pushing'
        type: boolean
        default: true
      update_docs:
        description: 'Also update README/CHANGELOG from .planning/ docs'
        type: boolean
        default: true

permissions:
  contents: write

env:
  # Explicitly sync these config files
  SYNC_FILES: >-
    package.json
    tsconfig.json
    vitest.config.ts
    README.md
    CONTRIBUTING.md
    CHANGELOG.md
    LICENSE

jobs:
  sync:
    name: Sync to oss-dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect syncable paths
        id: detect
        run: |
          echo "🔍 Detecting syncable paths from feature branch..."
          
          # Find all top-level directories that don't start with a dot
          # Exclude node_modules and docs (docs is handled specially)
          DIRS=$(find . -maxdepth 1 -type d ! -name ".*" ! -name "node_modules" ! -name "docs" ! -name "." -exec basename {} \; | sort)
          
          PATHS=""
          for dir in $DIRS; do
            PATHS="$PATHS $dir/"
            echo "  ✅ $dir/ (auto-detected)"
          done

          # Explicitly add .opencode
          if [ -d ".opencode" ]; then
            PATHS="$PATHS .opencode/"
            echo "  ✅ .opencode/ (explicitly added)"
          fi
          
          # Handle docs specially (only philosophy, guides, architecture)
          for docdir in docs/philosophy docs/guides docs/architecture; do
            if [ -d "$docdir" ]; then
              PATHS="$PATHS $docdir/"
              echo "  ✅ $docdir/"
            fi
          done

          # Add standard config files
          for file in ${{ env.SYNC_FILES }}; do
            if [ -f "$file" ]; then
              PATHS="$PATHS $file"
              echo "  ✅ $file"
            fi
          done

          echo "SYNC_PATHS=$PATHS" >> $GITHUB_ENV
          echo "📦 Paths to sync: $PATHS"

      - name: Generate docs and changelog
        if: github.event.inputs.update_docs == 'true'
        run: |
          echo "📝 Updating README and CHANGELOG from .planning/..."
          if [ -f "bin/update-docs.js" ]; then
            node bin/update-docs.js
          fi

      - name: Generate sync patch
        run: |
          echo "📦 Generating diff for paths: $SYNC_PATHS"
          
          # Generate patch for changes
          git diff ${{ github.event.inputs.commit_range }} -- $SYNC_PATHS > /tmp/sync.patch || true
          
          # Capture new files by diffing against oss-dev
          git diff origin/oss-dev..HEAD -- $SYNC_PATHS > /tmp/full-sync.patch || true

          if [ -s /tmp/sync.patch ]; then
            echo "✅ Incremental patch: $(wc -l < /tmp/sync.patch) lines"
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          elif [ -s /tmp/full-sync.patch ]; then
            echo "✅ Full diff patch available (new files detected)"
            cp /tmp/full-sync.patch /tmp/sync.patch
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          else
            echo "ℹ️ No source changes to sync"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          fi

      - name: Preview changes (dry run)
        if: env.HAS_CHANGES == 'true'
        run: |
          echo "📋 Files that would be synced:"
          git diff --stat ${{ github.event.inputs.commit_range }} -- $SYNC_PATHS
          echo ""
          echo "📋 New files (vs oss-dev):"
          git diff --stat --diff-filter=A origin/oss-dev..HEAD -- $SYNC_PATHS

      - name: Apply to oss-dev (checkout strategy)
        if: env.HAS_CHANGES == 'true' && github.event.inputs.dry_run == 'false'
        run: |
          SOURCE_SHA=$(git rev-parse HEAD)
          
          echo "🔄 Dereferencing symlinks for agent infrastructure..."
          mkdir -p /tmp/resolved-opencode
          for dir in agents commands skills; do
            if [ -e ".opencode/$dir" ]; then
              cp -RL ".opencode/$dir" "/tmp/resolved-opencode/"
            fi
          done

          git checkout oss-dev

          echo "🧹 Cleaning previous state for synced directories..."
          for path in $SYNC_PATHS; do
            if [ -d "$path" ] || [[ "$path" == */ ]]; then
              dir_path=${path%/}
              if [ -d "$dir_path" ] 2>/dev/null; then
                echo "  🗑️  Cleaning $dir_path"
                git rm -r --cached "$dir_path" 2>/dev/null || true
                rm -rf "$dir_path"
              fi
            fi
          done

          echo "🔄 Syncing directories and files from $SOURCE_SHA..."
          for path in $SYNC_PATHS; do
            echo "  → $path"
            git checkout $SOURCE_SHA -- "$path" 2>/dev/null || echo "  ⚠️  $path skipped"
          done
          
          echo "🔄 Restoring dereferenced agent infrastructure..."
          for dir in agents commands skills; do
            if [ -d "/tmp/resolved-opencode/$dir" ]; then
              rm -rf ".opencode/$dir"
              cp -R "/tmp/resolved-opencode/$dir" ".opencode/"
            fi
          done

          git add -A

          if git diff --cached --quiet; then
            echo "ℹ️ No effective changes after sync"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            echo "✅ Staged: $(git diff --cached --stat | tail -1)"
          fi

      - name: Commit changes
        if: env.HAS_CHANGES == 'true' && github.event.inputs.dry_run == 'false'
        run: |
          CHANGED_DIRS=$(git diff --cached --name-only | sed 's|/.*||' | sort -u | tr '\n' ', ' | sed 's/,$//')
          NEW_FILES=$(git diff --cached --diff-filter=A --name-only | wc -l | tr -d ' ')
          MOD_FILES=$(git diff --cached --diff-filter=M --name-only | wc -l | tr -d ' ')
          DEL_FILES=$(git diff --cached --diff-filter=D --name-only | wc -l | tr -d ' ')

          MSG="sync: merge source changes from feature branch

          Synced: $CHANGED_DIRS
          Source range: ${{ github.event.inputs.commit_range }}
          Files: +${NEW_FILES} new, ~${MOD_FILES} modified, -${DEL_FILES} deleted"

          git commit -m "$MSG"

      - name: Verify oss-dev build
        if: env.HAS_CHANGES == 'true' && github.event.inputs.dry_run == 'false'
        run: |
          npm install
          npm run typecheck
          npm run build
          npm test

      - name: Push oss-dev
        if: env.HAS_CHANGES == 'true' && github.event.inputs.dry_run == 'false'
        run: |
          git remote add public https://${{ secrets.PUBLIC_REPO_PAT }}@github.com/shynlee04/hivemind-plugin.git
          git push public oss-dev:oss-dev
