# Sync source changes from feature/harness-implementation to oss-dev
# Explicit whitelist model — only PUBLIC_PATHS below are synced.
# Everything else (dot-dirs, runtime manifestations like .opencode/,
# internal governance like .planning/ .hivemind/, /tmp/arxitect/ symlinks)
# is EXCLUDED from the public OSS branch.
#
# NOTE: .opencode/ is NOT source code. It is a runtime manifestation
# created when users run `npm install` → postinstall script copies from
# assets/ into the user's local .opencode/. The SOURCE is assets/.
# npm publish is controlled by package.json "files" field, separate concern.
name: Sync to OSS Branch

on:
  workflow_dispatch:
    inputs:
      commit_range:
        description: 'Commit range to sync (e.g., HEAD~3..HEAD or specific SHA)'
        required: false
        default: 'HEAD~1..HEAD'
      dry_run:
        description: 'Dry run — show what would be synced without pushing'
        type: boolean
        default: true

permissions:
  contents: write

env:
  # PUBLIC_PATHS — explicit whitelist of what goes to the OSS branch.
  # These are SOURCE files, not runtime manifestations.
  PUBLIC_PATHS: >-
    src/
    assets/
    bin/
    scripts/
    tests/
    docs/philosophy/
    docs/guides/
    docs/architecture/
    vitest.config.ts
    tsconfig.json
    package.json
    README.md
    CONTRIBUTING.md
    CHANGELOG.md
    LICENSE
    .gitignore

jobs:
  sync:
    name: Sync to oss-dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve whitelist paths
        id: resolve
        run: |
          echo "🔍 Resolving whitelist paths from PUBLIC_PATHS..."

          PATHS=""
          for path in ${{ env.PUBLIC_PATHS }}; do
            if [ -e "$path" ]; then
              PATHS="$PATHS $path"
              echo "  ✅ $path"
            else
              echo "  ⚠️  $path (not found — skipping)"
            fi
          done

          echo "SYNC_PATHS=$PATHS" >> $GITHUB_ENV
          echo "📦 Whitelisted paths: $PATHS"

      - name: Pre-sync validation — confirm no banned artifacts leak
        run: |
          echo "🔍 Pre-sync validation — checking for banned artifacts..."

          MISSING_SRC=false
          for required in src package.json tsconfig.json README.md; do
            if echo "$SYNC_PATHS" | grep -q "$required"; then
              echo "  ✅ $required in SYNC_PATHS"
            else
              echo "  ❌ $required MISSING from SYNC_PATHS"
              MISSING_SRC=true
            fi
          done

          for banned in .opencode .hivemind .planning .hivefiver-meta-builder; do
            if echo "$SYNC_PATHS" | grep -q "$banned"; then
              echo "::error::LEAK DETECTED: $banned in SYNC_PATHS"
              exit 1
            fi
          done
          echo "  ✅ No banned directories in SYNC_PATHS"

          if [ "$MISSING_SRC" = "true" ]; then
            echo "::warning::Required source paths missing from SYNC_PATHS"
          fi

          echo "  ✅ Pre-sync validation complete"

      - name: Generate sync patch
        run: |
          echo "📦 Generating diff for paths: $SYNC_PATHS"

          git diff ${{ github.event.inputs.commit_range }} -- $SYNC_PATHS > /tmp/sync.patch || true
          git diff origin/oss-dev..HEAD -- $SYNC_PATHS > /tmp/full-sync.patch || true

          if [ -s /tmp/sync.patch ]; then
            echo "✅ Incremental patch: $(wc -l < /tmp/sync.patch) lines"
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          elif [ -s /tmp/full-sync.patch ]; then
            echo "✅ Full diff patch available (new files detected)"
            cp /tmp/full-sync.patch /tmp/sync.patch
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          else
            echo "ℹ️ No source changes to sync"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          fi

      - name: Preview changes (dry run)
        if: env.HAS_CHANGES == 'true'
        run: |
          echo "📋 Files that would be synced:"
          git diff --stat ${{ github.event.inputs.commit_range }} -- $SYNC_PATHS
          echo ""
          echo "📋 New files (vs oss-dev):"
          git diff --stat --diff-filter=A origin/oss-dev..HEAD -- $SYNC_PATHS

      - name: Apply to oss-dev (checkout strategy)
        if: env.HAS_CHANGES == 'true' && github.event.inputs.dry_run == 'false'
        run: |
          SOURCE_SHA=$(git rev-parse HEAD)
          git checkout oss-dev

          echo "🧹 Cleaning previous state for synced directories..."
          for path in $SYNC_PATHS; do
            if [ -d "$path" ] || [[ "$path" == */ ]]; then
              dir_path=${path%/}
              if [ -d "$dir_path" ] 2>/dev/null; then
                echo "  🗑️  Cleaning $dir_path"
                git rm -r --cached "$dir_path" 2>/dev/null || true
                rm -rf "$dir_path"
              fi
            fi
          done

          # Remove any banned directories that may exist on oss-dev from prior syncs
          for dirtoban in .opencode .planning .hivemind .hivefiver-meta-builder; do
            if [ -d "$dirtoban" ]; then
              echo "  🗑️  Removing banned directory: $dirtoban/"
              git rm -rf --cached "$dirtoban" 2>/dev/null || true
              rm -rf "$dirtoban"
            fi
          done

          echo "🔄 Syncing directories and files from $SOURCE_SHA..."
          for path in $SYNC_PATHS; do
            echo "  → $path"
            git checkout $SOURCE_SHA -- "$path" 2>/dev/null || echo "  ⚠️  $path skipped"
          done

          git add -A

          if git diff --cached --quiet; then
            echo "ℹ️ No effective changes after sync"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            echo "✅ Staged: $(git diff --cached --stat | tail -1)"
          fi

      - name: Commit changes
        if: env.HAS_CHANGES == 'true' && github.event.inputs.dry_run == 'false'
        run: |
          CHANGED_DIRS=$(git diff --cached --name-only | sed 's|/.*||' | sort -u | tr '\n' ', ' | sed 's/,$//')
          NEW_FILES=$(git diff --cached --diff-filter=A --name-only | wc -l | tr -d ' ')
          MOD_FILES=$(git diff --cached --diff-filter=M --name-only | wc -l | tr -d ' ')
          DEL_FILES=$(git diff --cached --diff-filter=D --name-only | wc -l | tr -d ' ')

          MSG="sync: merge source changes from feature branch

          Synced: $CHANGED_DIRS
          Source range: ${{ github.event.inputs.commit_range }}
          Files: +${NEW_FILES} new, ~${MOD_FILES} modified, -${DEL_FILES} deleted"

          git commit -m "$MSG"

      - name: Verify oss-dev build
        if: env.HAS_CHANGES == 'true' && github.event.inputs.dry_run == 'false'
        run: |
          npm install
          npm run typecheck
          npm run build
          npm test

      - name: Push oss-dev
        if: env.HAS_CHANGES == 'true' && github.event.inputs.dry_run == 'false'
        run: |
          git remote add public https://${{ secrets.PUBLIC_REPO_PAT }}@github.com/shynlee04/hivemind-plugin.git
          git push public oss-dev:oss-dev
