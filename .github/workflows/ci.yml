# CI pipeline for HiveMind — runs on all pushes and PRs to oss-dev and main
name: CI

on:
  push:
    branches: [oss-dev, main]
  pull_request:
    branches: [oss-dev, main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Coverage report
        if: matrix.node-version == 22
        run: npm run test:coverage

  lint-check:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  # Phase 49 (REQ-07): BATS vendor-sync test surface in CI.
  # Per D-08: BATS is verification, not gating — continue-on-error at JOB level
  # means a flaky BATS environment (e.g. missing apt package on a future runner
  # image) does NOT block the PR. The red BATS job is a soft signal in the
  # Actions UI; humans investigate.
  bats-vendor-sync:
    name: BATS vendor-sync tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install BATS
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run BATS suite
        run: bats tests/scripts/sync-fork.bats
