name: hivefiver-audit-bridge
version: "1.0"
target_agent: hivefiver
phase: verification
domain: quality-assurance
description: "Augments hivefiver with verification skills, compliance checking, and audit report generation"

assets:
  workflow: workflows/hiveq-audit-workflow.yaml
  prompts:
    - prompts/compliance-rules.md
  templates:
    - templates/audit-report-template.md
  skills:
    - skills/verification-methodology
    - skills/gate-enforcement

entry_criteria:
  - "Deliverable exists to audit"
  - "Quality standards loaded"
exit_criteria:
  - "Audit report produced"
  - "All findings severity-classified"
  - "Quality gates executed"

replaces_workflow: true
priority: 70
