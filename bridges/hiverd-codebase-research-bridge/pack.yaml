name: hiverd-codebase-research-bridge
version: "1.0"
target_agent: hiverd
phase: code-research
domain: codebase-investigation
description: "Augments hiverd with repomix, grep, glob tools and code pattern extraction for codebase research"

assets:
  workflow: workflows/hiverd-comparative-analysis.yaml
  templates:
    - templates/analysis-matrix-template.md
  skills:
    - skills/comparative-analysis

entry_criteria:
  - "Target codebase or repository identified"
exit_criteria:
  - "Codebase analysis report produced"
  - "Patterns extracted with file references"

replaces_workflow: false
priority: 90
