name: hivefiver-build-bridge
version: "1.0"
target_agent: hivefiver
phase: implementation
domain: framework-construction
description: "Augments hivefiver with scaffolding templates, implementation workflows, and code pattern skills"

assets:
  workflow: workflows/hivefiver-enterprise.yaml
  templates:
    - templates/gate-checklist-template.md
  skills:
    - skills/hivefiver-domain-pack-router
    - skills/hivefiver-gsd-compat

entry_criteria:
  - "Spec document approved"
  - "Target module defined"
exit_criteria:
  - "All module assets created"
  - "Asset cross-references valid"
  - "Sync check passes"

replaces_workflow: true
priority: 80
