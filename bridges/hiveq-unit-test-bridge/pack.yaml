name: hiveq-unit-test-bridge
version: "1.0"
target_agent: hiveq
phase: unit-testing
domain: test-execution
description: "Augments hiveq with test execution, coverage analysis, and failure diagnosis"

assets:
  workflow: workflows/hiveq-gate-enforcement.yaml
  templates:
    - templates/gate-checklist-template.md
  skills:
    - skills/gate-enforcement

entry_criteria:
