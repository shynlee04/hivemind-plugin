# INTERNAL HIVEMIND METADATA
# ==========================
# This file contains HiveMind-internal metadata for skill management.
# It is NOT used by OpenCode for skill loading.
# OpenCode skills require only: name, description (2 fields max).
# For official skill acceptance, see SKILL.md frontmatter standards.

version: "1.0.0"
source_of_truth: true
local_first_resolution: true
external_opt_in: true
# Non-Interactive Shell Awareness (Canonical)
# - Shell is non-interactive (no TTY/PTY). Never run commands that wait for prompts or UI input.
# - Always use non-interactive flags and explicit messages (`-y`, `--yes`, `--non-interactive`, `--no-edit`, `-f`).
# - If a tool can still block, provide deterministic input (`yes |`, heredoc) or fail fast with a timeout.
#
# Registry Rule: Every entry MUST have a corresponding skills/{name}/SKILL.md directory.
# Phantom entries (in registry but no root dir) are forbidden.
# Mirror-only skills (.opencode/skills/) are NOT listed here — they resolve via fallback.
#
# Archival Note (2026-03-20):
#   Phantom entries removed: context-integrity, delegation-framework, evidence-discipline,
#   verification-methodology, meta-builder-governance, wrong-start-resolver, entry-resolution.
#   These moved to skills/_archived/ or skills/_deprecated_hive/.

