contract_version: 2
name: feature-sprint
target_agent: hivemaker
description: "Canonical implementation workflow for scoped feature delivery."
steps:
  - name: scope-lock
    tool: hivemind-delegate
    wave: 1
    entry_criteria: "Delegation packet validated"
    exit_criteria: "Scope and constraints acknowledged"
  - name: test-first
    tool: hiveq-verify
    wave: 2
    entry_criteria: "Scope locked"
    exit_criteria: "Acceptance criteria mapped to verification checks"
  - name: implement
    tool: hivemaker
    wave: 3
    entry_criteria: "Verification map ready"
    exit_criteria: "Changes applied within scope"
  - name: verify
    tool: hiveq-verify
    wave: 4
    entry_criteria: "Implementation complete"
    exit_criteria: "Quality gates pass or failures classified"
guards:
  - rule: no_scope_drift
    check: scope_paths_respected
  - rule: evidence_required
    check: verification_evidence_present
