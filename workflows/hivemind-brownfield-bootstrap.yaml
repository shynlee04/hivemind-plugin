contract_version: 2
name: hivemind-brownfield-bootstrap
target_agent: hiveminder
description: Detect framework context, capture baseline intelligence, and prepare safe execution path.
version: 1
steps:
  - name: analyze
    tool: scan_hierarchy
    wave: 1
    skill_bundles:
      - context-integrity
    args:
      action: analyze
      json: true
    entry_criteria: "Project root accessible"
    exit_criteria: "Hierarchy status analyzed and reported"
  - name: recommend
    tool: scan_hierarchy
    wave: 2
    skill_bundles:
      - context-integrity
    args:
      action: recommend
    entry_criteria: "Analysis results available"
    exit_criteria: "Recommendations generated"
  - name: orchestrate
    tool: scan_hierarchy
    wave: 3
    skill_bundles:
      - context-integrity
    args:
      action: orchestrate
      json: true
    entry_criteria: "Recommendations ready"
    exit_criteria: "Orchestration plan produced"
  - name: lock-focus
    tool: map_context
    wave: 4
    skill_bundles:
      - context-integrity
    args:
      level: tactic
      content: Brownfield cleanup plan execution
    entry_criteria: "Orchestration plan approved"
    exit_criteria: "Tactic-level context locked for brownfield execution"
guards:
  - rule: hierarchy_present
    check: scan_hierarchy_returns_valid
  - rule: context_locked
    check: tactic_level_context_set
