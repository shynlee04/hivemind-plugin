contract_version: 2
name: hiverd-deep-research
description: "Structured multi-source research with question framing, evidence gathering, source evaluation, and synthesis."
version: 1
target_agent: hiverd
steps:
  - name: question-framing
    description: "Transform topic into 3-5 specific, answerable sub-questions with scope boundaries"
    tool: hiverd
    wave: 1
    skill_bundles:
      - research-methodology
    args:
      action: frame
    entry_criteria: "Research topic defined"
    exit_criteria: "3-5 research sub-questions framed with scope boundaries"

  - name: source-discovery
    description: "Find 8-12 relevant sources across web, repos, and documentation using MCP tools"
    tool: hiverd
    wave: 2
    skill_bundles:
      - research-methodology
      - source-evaluation
    args:
      action: discover
      min_sources: 8
      max_sources: 12
    entry_criteria: "Questions framed"
    exit_criteria: "8-12 relevant sources discovered"

  - name: evidence-gathering
    description: "Extract evidence cards from each source with citations and confidence levels"
    tool: hiverd
    wave: 3
    skill_bundles:
      - source-evaluation
      - synthesis-patterns
    args:
      action: gather
      require_citations: true
    entry_criteria: "Sources discovered"
    exit_criteria: "Evidence cards extracted with citations and confidence levels"

  - name: synthesis
    description: "Resolve contradictions, identify patterns, fill gaps across all evidence"
    tool: hiverd
    wave: 4
    skill_bundles:
      - synthesis-patterns
    args:
      action: synthesize
      resolve_contradictions: true
    entry_criteria: "Evidence gathered"
    exit_criteria: "Contradictions resolved and patterns identified"

  - name: report-generation
    description: "Produce structured research report using template"
    tool: hiverd
    wave: 5
    skill_bundles:
      - research-methodology
    args:
      action: report
      template: templates/research-report-template.md
    entry_criteria: "Synthesis complete"
    exit_criteria: "Structured research report generated"

guards:
  - rule: mcp_available
    check: at_least_two_mcp_tools_accessible
  - rule: evidence_required
    check: all_claims_have_citations
  - rule: confidence_scored
    check: all_findings_have_confidence_level
