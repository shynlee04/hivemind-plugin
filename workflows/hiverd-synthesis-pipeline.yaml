name: hiverd-synthesis-pipeline
description: "Combine multiple research outputs into unified report with contradiction resolution."
version: 1
target_agent: hiverd
steps:
  - name: input-indexing
    description: "Catalog all input documents with scope, confidence levels, and key claims"
    tool: hiverd
    args:
      action: index_inputs
    wave: 1

  - name: pattern-extraction
    description: "Identify recurring themes, agreements, and contradictions across inputs"
    tool: hiverd
    args:
      action: extract_patterns
    wave: 2

  - name: cross-reference
    description: "Resolve contradictions and fill coverage gaps with additional evidence"
    tool: hiverd
    args:
      action: cross_reference
      resolve_contradictions: true
    wave: 3

  - name: unified-output
    description: "Write coherent synthesis integrating all inputs"
    tool: hiverd
    args:
      action: unify
      template: templates/research-report-template.md
    wave: 4

guards:
  - rule: all_inputs_indexed
    check: input_catalog_complete
  - rule: contradictions_addressed
    check: no_unresolved_contradictions
