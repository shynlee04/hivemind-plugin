contract_version: 2
name: composed-research-then-build
target_agent: hiveminder
description: Compose research and build workflows with explicit phase gates.
version: 1
compose:
  - workflow: hivefiver-enterprise.yaml
    phase: research
    gate: confidence >= "partial"
  - workflow: sequential-delegation-workflow.yaml
    phase: build
    gate: hierarchy.action != null
guards:
  - rule: compose_contract_valid
    check: composed_workflow_entries_present
