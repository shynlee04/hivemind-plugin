contract_version: 2
name: bug-remediation
target_agent: hivehealer
description: "Canonical bug remediation workflow with root-cause-first policy."
steps:
  - name: reproduce
    tool: hivehealer
    wave: 1
    entry_criteria: "Bug report available"
    exit_criteria: "Failure reproduced with evidence"
  - name: root-cause
    tool: hivexplorer
    wave: 2
    entry_criteria: "Failure reproduced"
    exit_criteria: "Root cause hypothesis validated"
  - name: patch
    tool: hivehealer
    wave: 3
    entry_criteria: "Root cause confirmed"
    exit_criteria: "Minimal remediation applied"
  - name: regression-gate
    tool: hiveq-regression
    wave: 4
    entry_criteria: "Patch applied"
    exit_criteria: "Regression checks reported"
guards:
  - rule: no_blind_fix
    check: root_cause_evidence_present
  - rule: rollback_ready
    check: failure_policy_declared
